version: 2
updates:
  # Bun-Projekt mit bun.lock — „npm“ aktualisiert die Lockdatei nicht → CI scheitert an --frozen-lockfile
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      svelte:
        patterns:
          - "svelte*"
          - "@sveltejs/*"
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
