name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create CI env file
        run: |
          echo "DATABASE_URL=postgresql://localhost:5432/postgres" >> .env
          echo "SMTP_HOST=localhost" >> .env
          echo "SMTP_PORT=587" >> .env
          echo "SMTP_USER=ci@example.com" >> .env
          echo "SMTP_PASS=dummy" >> .env
          echo "ADMIN_USER=admin" >> .env
          echo "ADMIN_PASS=dummy" >> .env

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run check

      - name: Build
        run: bun run build
        env:
          DATABASE_URL: postgresql://localhost:5432/postgres

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create CI env file
        run: |
          echo "DATABASE_URL=postgresql://localhost:5432/postgres" >> .env
          echo "SMTP_HOST=localhost" >> .env
          echo "SMTP_PORT=587" >> .env
          echo "SMTP_USER=ci@example.com" >> .env
          echo "SMTP_PASS=dummy" >> .env
          echo "ADMIN_USER=admin" >> .env
          echo "ADMIN_PASS=dummy" >> .env

      - name: Build
        run: bun run build
        env:
          DATABASE_URL: postgresql://localhost:5432/postgres

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          printf "Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n" > ~/.ssh/config

      - name: Upload build
        run: |
          rsync -az --delete build/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/kontaktformular/build/
          rsync -az --delete prisma/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/kontaktformular/prisma/
          scp package.json ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/kontaktformular/package.json
          scp prisma.config.ts ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/kontaktformular/prisma.config.ts
          scp docker-compose.yml ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/kontaktformular/docker-compose.yml
          rsync -az scripts/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/kontaktformular/scripts/

      - name: Restart app
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd /opt/kontaktformular && set -a && [ -f .env ] && . ./.env && set +a && npx --yes prisma@7.4.2 migrate deploy && npm install --omit=dev --ignore-scripts --silent && pm2 delete kontaktformular 2>/dev/null || true && pm2 start build/index.js --name kontaktformular && pm2 save --force"
