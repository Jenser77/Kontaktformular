name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      # Prisma (prisma.config.ts / postinstall generate) läuft schon bei `bun install` — vorhanden sein, bevor .env aus dem Repo fehlt
      DATABASE_URL: postgresql://localhost:5432/postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Create CI env file
        run: |
          echo "DATABASE_URL=postgresql://localhost:5432/postgres" > .env
          echo "SMTP_HOST=localhost" >> .env
          echo "SMTP_PORT=587" >> .env
          echo "SMTP_USER=ci@example.com" >> .env
          echo "SMTP_PASS=dummy" >> .env

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      DATABASE_URL: postgresql://localhost:5432/postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Create CI env file
        run: |
          echo "DATABASE_URL=postgresql://localhost:5432/postgres" > .env
          echo "SMTP_HOST=localhost" >> .env
          echo "SMTP_PORT=587" >> .env
          echo "SMTP_USER=ci@example.com" >> .env
          echo "SMTP_PASS=dummy" >> .env

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          printf "Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n" > ~/.ssh/config

      - name: Upload build
        run: |
          rsync -az --delete build/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/kontaktformular/build/
          rsync -az --delete prisma/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/kontaktformular/prisma/
          scp package.json ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/kontaktformular/package.json
          scp ecosystem.config.cjs ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/kontaktformular/ecosystem.config.cjs
          scp docker-compose.yml ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/kontaktformular/docker-compose.yml
          rsync -az scripts/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/kontaktformular/scripts/

      - name: Restart app
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "bash -lc 'set -euo pipefail; \
            cd /opt/kontaktformular; \
            set -a; [ -f /etc/kontaktformular.env ] && . /etc/kontaktformular.env; set +a; \
            node --version; npm --version; \
            echo [deploy] npm install; \
            npm install --omit=dev --ignore-scripts; \
            echo [deploy] prisma migrate deploy; \
            PRISMA_DISABLE_CONFIG=1 npx --yes prisma@7.6.0 migrate deploy --schema prisma/schema.prisma; \
            echo [deploy] pm2 startOrRestart; \
            pm2 startOrRestart ecosystem.config.cjs --update-env; \
            pm2 save --force; \
            pm2 status kontaktformular'"
