name: Code Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  code-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://localhost:5432/postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Create CI env file
        run: |
          echo "DATABASE_URL=postgresql://localhost:5432/postgres" > .env
          echo "SMTP_HOST=localhost" >> .env
          echo "SMTP_PORT=587" >> .env
          echo "SMTP_USER=ci@example.com" >> .env
          echo "SMTP_PASS=dummy" >> .env

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run check

      - name: Test
        run: bun run test
